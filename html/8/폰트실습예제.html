<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  <style>
    body {
      font-family: "Roboto", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
      font-variation-settings:
      "wdth" 100;
    }
    .container {
      width: 304px;
      height: 390px;
      border: 1px solid rgb(173, 173, 173);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 17px;
    }
    .login {
      width: 228px;
      height: 44px;
      font-weight: bold;
      font-size: 14px;
      color: #504444;
      border: 1px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 28px 0 0 0;
      gap: 10px;
    }
    .or {
      font-size: 16px;
      font-weight: bold;
      color: #504444;
    }
    input {
      background-color: #eaeaea;
      width: 228px;
      height: 44px;
      margin: 10px;
      border: none;
      outline: none;
    }
    .input {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .button button {
      font-size: 14px;
      color: #ffffff;
      background-color: #373F3C;
      width: 229px;
      height: 44px;
      border: none;
    }
    .text {
      margin-top: 8px;
      font-size: 14px;
      color: #2C3432;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login">
      <i class="fa-brands fa-google"></i>
      Log in with Google</div>
    <div class="or">or</div>
    <div class="input">
      <input type="text" placeholder="Username">
      <input type="text" placeholder="Password">
    </div>
    <div class="button">
      <button>LOGIN</button>
    </div>
    <div class="text">Forgot you password?</div>
  </div>
</body>
</html>
