<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 적용 우선 순위 : inportant -> 인라인 -> 아이디 -> 클래스 -> 태그 -> 전체 -> 상속 */
    /* 상속 : 부모 요소에 적용된 스타일을 자식 요소가 물려 받는 것 */
    .parent {
      font-size: 1vh;
    }
    .child {
      font-size: 2vh;
    }
    .child-to-child {
      font-size: 3vh;
    }
    /* 색상 표기법   : 색상 키워드 사용, rgb 색상표기(10진법), HEX표기법 */
    /* 색상키워드 : red, green, yellow */
    /* rgb 색상표기 : rgb(255, 0, 0) */
    /* HEX 표기법 : #ff000 -> #f00 */
    h1 {
      color: rgb(255, 0, 0);
    }
    h2 {
      color: rgba(0, 255, 0, 0.5); /* 투명도 지정 */
    }
    h3 {
      color: #0000ff;
    }
  </style>
</head>
<body>
  <div>
    <h2>오늘의 날씨</h2>
    <p>오늘은 날씨가 흐립니다.</p>
    <div class="parent">
      <p>부모의 폰트 크기 입니다.</p>
      <div class="child">
        <p>자식의 폰트 크기 입니다.</p>
        <div class="child-to-child">
          <p>자식의 자식 폰트 크기</p>
        </div>
      </div>
    </div>
    <h1>RGB로 색상을 지정</h1>
    <h2>RGBA로 색상과 투명도를 지정</h2>
    <h3>HEX 값으로 색상을 지정</h3>
  </div>
</body>
</html>
