<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 가상 요소 선택자 사용 : 실제 존재하지 않는 가상의 부분에 스타일 적용 */
    h1::before {
      content: "%%%%";
      color: red;
    }
    h1::after {
      content: "$$$$$";
      color: blue;
    }
    /* 가상 클래스 선택자 : 요소의 특정 상태를 기반으로 스타일 적용 */
    a {
      display: block;
    }
    a:link {
      color: orange;
    }
    a:visited {
      color: green;
    }
    /* 동적 가상 클래스 선택자 : 사용자의 행동에 따라 동적으로 변하는 상태를 이용 */
    /* hover : 요소에 마우스를 올리면 해당 태그가 선택 됨 */
    /* active : 요소를 마우스로 누를 때 해당 태그가 선택 됨 */
    div {
      width: 100px;
      height: 60px;
      background-color: orangered;
      border: solid black 1px;
      border-radius: 10px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 1s all;
    }
    /* div:hover {
      width: 200px;
      background-color: darkred;
    } */
    div:active {
      height: 160px;
      background-color: royalblue;
    }
    /* 입력요소 가상 클래스 선택자 : 입력 요소의 특정 상태를 이용해 선택자로 지정 */
    /* :focus 입력 요소에 커서가 활성화되면 선택자로 지정 */
    /* :checked 체트 박스가 표시되어 있으면 선택자로 지정 */
    /* :disabled 입력 요소가 비활성화되면 선택자로 지정 */
    /* :enabled 입력 요소가 활성화 되면 선택자로 지정 */
    input:focus {
      color: red;
      background-color: brown;
    }
    /* 인접 형제 선택자 */
    input:checked + label {
      color: red;
    }

    input:disabled {
      color: darkblue;
      background-color: black;
    }


  </style>
</head>
<body>
  <h1>여기는 헤더 영역 입니다.</h1>
  <a href="http://naver.com">네이버</a>
  <a href="http://kakao.com">카카오</a>
  <a href="http://google.com">구글</a>
  <div>박스</div>
  <label>입력 <input type="text"></label>
  <input type="checkbox" id="userid">
  <label for="userid">아이디</label>
  <input type="text" disabled placeholder="비활성화">
</body>
</html>
