<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    li {
      list-style: none;
    }
    /* 구조적 가상 클래스 선택자 : 요소의 구조와 위치에 따라 스타일을 적용하는 방법 */
    li:first-child {
      color: red;
    }
    li:last-child {
      color: blue;
    }
    li:nth-child(2n) {
      color: aqua;
    }
  </style>
</head>
<body>
  <ul>
    <li>사과</li>
    <li>바나나</li>
    <li>딸기</li>
    <li>키위</li>
    <li>망고</li>
    <li>토마토</li>
  </ul>
</body>
</html>
