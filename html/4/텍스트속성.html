<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* font-family : 웹 페이지에 사용할 글꼴을 지정 */
    body {
      font-family: "맑은 고딕", "Nanum Gothic", "sans-serif";
      font-size: 24px;
      /* 100~900 단위로 표시 */
      font-weight: bold;
      font-style: italic;
      text-align: center;
      text-decoration: none;
      line-height: 1.3;
      letter-spacing: 2px;
    }
    p {
      margin: 0;
      padding: 0;
    }
    .shadow1 {
      color: royalblue;
      text-shadow: 3px 3px 10px black;
    }
  </style>
</head>
<body>
  <p>안뇽하세요 텍스트 속성을 공부합니다</p>
  <p>CSS는 공부해야 할 게 너무 많아요~~~~~~~~~~</p>
  <h2 class="shadow1">HTML</h2>
</body>
</html>
