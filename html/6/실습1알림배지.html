<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      width: 450px;
      height: 400px;
      display: flex;
      justify-content: space-between;
    }
    .box {
      width: 100px;
      height: 100px;
      margin: 20px;
    }
    .box1 {
      background-color: royalblue;
      border-radius: 25px;
      position: relative
    }
    .box2 {
      background-color: royalblue;
      border-radius: 25px;
      position: relative
    }
    .box3 {
      background-color: royalblue;
      border-radius: 25px;
      position: relative
    }
    .num1 {
      width: 35px;
      height: 35px;
      background-color: #ff5e5e;
      color: white;
      border-radius: 50%;
      text-align: center;
      position: absolute;
      right: -10px;
      top: -10px;
      font-size: 20px;
    }
    .num2 {
      width: 35px;
      height: 35px;
      background-color: #ff5e5e;
      color: white;
      border-radius: 50%;
      text-align: center;
      position: absolute;
      right: -10px;
      top: -10px;
      font-size: 20px;
    }
    .num3 {
      width: 35px;
      height: 35px;
      background-color: #ff5e5e;
      color: white;
      border-radius: 50%;
      text-align: center;
      position: absolute;
      right: -10px;
      top: -10px;
      font-size: 20px;
    }
    .icon {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90px;
      font-size: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box box1">
      <div class="num1">3</div>
      <div class="icon icon1">🔔</div>
    </div>
    <div class="box box2">
      <div class="num2">12</div>
      <div class="icon icon2">💬</div>
    </div>
    <div class="box box3">
      <div class="num3">1</div>
      <div class="icon icon3">🛒</div>
    </div>
  </div>
</body>
</html>
