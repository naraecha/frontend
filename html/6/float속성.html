<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* float 속성 : 대상 요소를 공중에 띄워 다음에 오는 요소를 주변에 자연스럽게 배치 */
    /* .container {
      display: flex;
      gap: 10px;
    } */
     img {
      float: left;
      margin-right: 10px;
     }
     .bottom {
      clear: left;
     }
  </style>
</head>
<body>
  <div class="container">
    <img src="./images/coffee.jpg" alt="커피">
    <p>float 속성은 대상 요소를 공중에 띄워 다음에 오는 요소를 주변에 자연스럽게 배치하기 위한 용도로 사용 합니다.</p>
    <p class="bottom">아래의 내용입니다.</p>
  </div>
</body>
</html>
