<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      width: 1000px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .img {
      display: flex;
      gap: 10px;
      text-align: center;
    }
    .img1 {
      position: relative;
    }
    .img1:hover .p1{
      transform: translateY(-204px);
      transition: 0.8s 0.2s all ease-in-out;
      opacity : 1
    }
    .img2:hover .p2{
      transform: translateY(-204px);
      transition: 0.8s 0.2s all ease-in-out;
      opacity : 1
    }
    .img3:hover .p3{
      transform: translateY(-204px);
      transition: 0.8s 0.2s all ease-in-out;
      opacity : 1
    }
    .img2 {
      position: relative;
    }
    .img3 {
      position: relative;
    }
    .p1 {
      color: white;
      background-color: rgb(0, 0, 0, 0.5);
      width: 300px;
      height: 200px;
      position: absolute;
      opacity : 0
    }
    .p2 {
      color: white;
      background-color: rgb(0, 0, 0, 0.5);
      width: 300px;
      height: 200px;
      position: absolute;
      opacity : 0
    }
    .p3 {
      color: white;
      background-color: rgb(0, 0, 0, 0.5);
      width: 300px;
      height: 200px;
      position: absolute;
      opacity : 0
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>신상품 목록</h1>
    </header>
    <div class="img">
      <div class="img1">
        <img src="./image/prod1.jpg" alt="1">
        <div class="p1"><h2>상품 1</h2></div>
      </div>
      <div class="img2">
        <img src="./image/prod2.jpg" alt="2">
        <div class="p2"><h2>상품 2</h2></div>
      </div>
      <div class="img3">
        <img src="./image/prod3.jpg" alt="3">
        <div class="p3"><h2>상품 3</h2></div>
      </div>
    </div>
  </div>
</body>
</html>
