<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 박스모델: 각각의 요소가 화면에 영역을 차지하는 형태 */
    /* content : 요소의 내용 */
    /* padding : 요소의 내부 여백, border 기준 */
    /* border : 요소의 테두리 경계선 */
    /* margin : 요소의 외부 여백 */
    p {
      margin: 10px 10px 10px 5px; /* 탑부터 시계방향 / ex) 상하-좌우 / 상-우-하-좌 / 상-좌우-하 */
      padding: 10px;
      border: 1px solid black;
      width: 100px;
      height: 100px;
      box-sizing: border-box;
      background-color: aqua;
      border-radius: 10px 10px 0px 0px; /* 좌측상단부터 시계방향 */
      box-shadow: 2px 2px 5px blue; /* 오른쪽 - 아래 - 번짐 - 색 */
      display: flex; /* 정렬하기 쉽게 만들어주는 레이아웃 방식 / 자식 요소들이 가로 방향으로 정렬됨 */
      align-items: center; /* 가로 정렬 */
      justify-content: center; /* 세로 정렬 */
    }
    .container {
      display: flex;
      width: 768;
      margin: auto;
      background-color: orange;
    }
  </style>
</head>
<body>
  <div class="container">
    <p>BOX1</p>
    <p>BOX2</p>
    <p>BOX3</p>
  </div>
  
</body>
</html>
