<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 제목 */
h1 {
  font-family: serif;
  font-size: 28px;
  font-weight: bold;
}

p, .content {
  font-family: sans-serif;
  font-size: 16px;
  line-height: 1.9;
  color: #444;
}

.byline {
  font-family: sans-serif;
  font-size: 14px;
  font-weight: normal;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #999;
}

/* 드롭캡 (첫 글자 크게 띄우기) */
p::first-letter, .content::first-letter {
  font-size: 3em;
  float: left;
  line-height: 1;
  font-weight: bold;
  color: orangered;
}

/* 노란 하이라이트 배경 */
.highlight {
  background-color: #fff59d;
}

/* 물결 밑줄 */
.underline-fancy {
  text-decoration-line: underline;
  text-decoration-style: wavy;
  text-decoration-color: #f44336; 
}
  </style>
</head>
<body>
  <h1>CSS가 바꾼 웹 디자인의 역사</h1>

  <p class="byline">by Kim Coder · Web Design Weekly</p>

  <p class="content">
  CSS는 <span class="highlight">콘텐츠와 표현을 분리</span>하는 혁신적인 기술입니다.  
  오늘날 우리가 사용하는 웹 페이지는 <span class="underline-fancy">CSS 없이는 상상할 수 없습니다.</span>
  </p>
</body>
</html>
