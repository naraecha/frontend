<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    header {
      background-color: rgb(39, 32, 78);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
    }
    header h1 {
      letter-spacing: -0.03em;
      color: white;
    }
    .asd {
      display: flex;
    }
    aside {
      width: 500px;
      height: 150px;
      background-color: rgb(150, 150, 255);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 10px;
      color: white;
    }
    main {
      width: 1500px;
      background-color: rgb(255, 150, 150);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
      color: white;
    }
    .card {
      display: flex;
    }
    .card1 {
      width: 1500px;
      background-color: rgb(255, 218, 97);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
      color: white;
      height: 150px;
    }
    .card2 {
      width: 500px;
      height: 150px;
      background-color: rgb(110, 110, 110);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
      color: white;
      
    }
  </style>
</head>
<body>
  <header>
    <h1>HEADER</h1>
  </header>
  <div class="asd">
    <aside>
      <h1>ASIDE</h1>
    </aside>
    <main>
      <h1>MAIN</h1>
    </main>
  </div>
  <div class="card">
    <div class="card1">
      <h1>CARD (even)</h1>
    </div>
    <div class="card2">
      <h1>CARD (odd)</h1>
    </div>
  </div>
</body>
</html>
