<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 그라데이션 : 두 개 이상의 색을 부드럽게 전환 */
    /* 선형 그라데이션 : 색상이 수직, 수평, 대각선으로 부드럽게 전환 */
    .linear-box {
      width: 300px;
      height: 200px;
      background: linear-gradient(to right, red, green);
    }
    /* 방사형 그라데이션 */
    .radial-box {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, blue, skyblue);
      border-radius: 150px;
    }
  </style>
</head>
<body>
  <div class="linear-box"></div>
  <div class="radial-box"></div>
</body>
</html>
