<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    .box {
      width: 100px;
      height: 100px;
      background-color: orange;
      border: 3px dotted red;
      border-radius: 2px;
      display: block;
      box-sizing: border-box;
    }
    .container {
      display: flex;
      width: 100vw; /* view width */
      padding: 10px;
      background-color: gray;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>
</body>
</html>
