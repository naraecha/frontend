<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .banner {
      height: 200px;
      background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
      repeating-linear-gradient(45deg, #ffe02f 10px,
      #ffe02f 20px,
      #fffade 20px,
      #fffade 30px);
      color: white;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

  </style>
</head>
<body>
  <div class="banner">
    <div class="text">
      <h1>웹 디자인의 미래</h1>
      <p>CSS 배경 속성으로 만드는 인상적인 레이아웃</p>
    </div>
  </div>
</body>
</html>
