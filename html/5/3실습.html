<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .card {
      width: 220px;
      height: 260px;
      padding: 24px;
      border: 2px solid black;
      box-sizing: border-box;
      box-shadow: 6px 6px 0;
      margin: 0 auto;
      text-align: center;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: rgb(54, 80, 168);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .stats {
      width: 168px;
      height: 64px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid grey;
    }
    .stat {
      width: 64px;
      height: 64px;
      text-align: center;
      margin: 17px 0px;
    }
    .card h3 {
      margin-bottom: 0;
      font-size: 15px;
    }
    .role {
      font-size: 12px;
      letter-spacing: 1.5px;
      margin: 8px 0px 20px;
      color: rgb(116, 116, 116);
    }
    .num {
      font-weight: bold;
      color: rgb(177, 52, 52);
    }
    .lbl {
      font-size: 11px;
      color: grey;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👩‍💻</div>
    <h3>Kim Coder</h3>
    <p class="role">FRONTEND DEV</p>
    <div class="stats">
      <div class="stat">
        <div class="num">128</div>
        <div class="lbl">Projects</div>
      </div>
      <div class="stat">
        <div class="num">4.9</div>
        <div class="lbl">Rating</div>
      </div>
      <div class="stat">
        <div class="num">5yr</div>
        <div class="lbl">Exp</div>
      </div>
    </div>
  </div>
</body>
</html>
