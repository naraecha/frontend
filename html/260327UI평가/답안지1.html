<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>답안지1</title>
  <style>
    div {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    button {
      margin-top: 4px;
      height: 25px;
    }
    div .b1 {
      width: 165px;
      background-color: white;
      border: 1px solid;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h3>검색 안내사항</h3>
  <ol>
    <li>사용일자: 2000년 1월 ~ 10월</li>
    <li>제출방법 : google.com 사이트에 접속하여 검색</li>
  </ol>
  <a href="https://google.com"><b>구글 사이트로 이동</b></a>

  <h3>오늘의 날씨</h3>
  <table border="1">
    <tr>
      <th>지역</th>
      <th>현재기온</th>
      <th colspan="2">불쾌지수/습도(%)</th>
      <th>풍속(m/s)</th>
    </tr>
    <tr>
      <td rowspan="2">서울/경기</td>
      <td>23</td>
      <td>60</td>
      <td>80</td>
      <td>4.7</td>
    </tr>
    <tr>
      <td>20</td>
      <td>60</td>
      <td>80</td>
      <td>5.0</td>
    </tr>
    <tr>
      <td>제주도</td>
      <td>21</td>
      <td>65</td>
      <td>85</td>
      <td>3.6</td>
    </tr>
  </table>
  <div>
    <p>한 줄 코멘트:</p>
    <button class="b1"></button>
    <button>확인</button>
    <button>삭제</button>
  </div>
</body>
</html>
