<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8">
        <title>예제 C - iframe 포털</title>
    </head>
    <body>
        <header>
            <h1 id="top">영상 학습 포털</h1>
            <p title="iframe으로 youtube 영상 및 구글 지도 넣기">
                오늘 목표: iframe으로 유튜브 영상을 페이지 안에 넣어보기<br>
                + iframe에 구글 지도 띄우기<br>
                nav 메뉴로 섹션 이동(앵커)
            </p>
            <hr>
        </header>

        <nav>
            <p title="nav는 메뉴(이동 링크 모음)입니다.">메뉴</p>
            <ul>
                <li><a href="#intro" title="소개로 이동">소개</a></li>
                <li><a href="#video" title="영상으로 이동">영상</a></li>
                <li><a href="#gamp" title="">지도</a></li>
            </ul>
            <hr>
        </nav>

        <main>
            <section id="intro">
                <h2>소개</h2>
                <p>
                    iframe은 페이지 안에 "창틀"을 만들어서<br>
                    다른 콘텐츠(유튜브, 지도 등)를 끼워 넣는 태그입니다.
                </p>
                <p><a href="#top">맨 위로</a></p>
                <hr>
            </section>

            <section id="video">
                <h2>영상</h2>

                <iframe name="player" width="560" height="315" src="https://www.youtube.com/embed/B8A9__xUFJs?si=PzLfu31nEOP3B-rO" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

                <!-- <iframe
                    name="player"
                    width="560"
                    height="315"
                    src="https://www.youtube.com/watch?v=B8A9__xUFJs"
                    title="유튜브 영상 1"
                    allowfullscreen>
                </iframe> -->

                <p title="target=player는 iframe name=player로 열겠다는 뜻">
                    아래 링크를 누르면 같은 창(iframe)에서 영상이 바뀝니다.
                </p>

                <ul>
                    <li>
                        <a href="https://www.youtube.com/embed/0xvNed3G-18"
                        target="player"
                        title="같은 iframe에서 다른 영상으로 교체">
                        다른 영상으로 바꾸기 1
                        </a>
                    </li>
                    <li>
                        <a href="https://www.youtube.com/embed/Z3-r715ubDg"
                        target="player"
                        title="같은 iframe에서 다른 영상으로 교체">
                        다른 영상으로 바꾸기 2
                        </a>
                    </li>
                </ul>

                <p><a href="#top">맨 위로</a></p>
                <hr>
            </section>

            <section id="gmap">
                <h2>지도</h2>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3194.4685079977835!2d127.14458081160836!3d36.807291672129395!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b2863c5bb6bb5%3A0x1bc123fe0c4b4510!2z7Zy066i86rWQ7Jyh7IS87YSw!5e0!3m2!1sko!2skr!4v1771481754263!5m2!1sko!2skr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

                <p><a href="#top">맨 위로</a></p>
            </section>
        </main>

        <footer>
            <hr>
            <p>© 2026 iframe 실습</p>
        </footer>
    </body>
</html>
