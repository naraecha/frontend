<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>실습3 - 미디어</title>
</head>
<body>
    <h1>오디오/비디오 맛보기</h1>
    <p>controls가 있어야 재생 버튼이 보입니다.</p>
    <hr>
    <h2>오디오</h2>
    <audio controls>
        <source src="./media/sample.mp3" type="audio/mpeg">
    </audio>
    <h2>비디오</h2>
    <video controls width="320">
        <source src="./media/sample.mp4" type="video/mp4">
    </video>

    <h2>youtube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/Z3-r715ubDg?si=hBjB2s3BYhFHunnP" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <p>파일 경로가 틀리면 재생이 안 됨(src확인)</p>
</body>
</html>
