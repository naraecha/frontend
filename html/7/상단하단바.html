<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      width: 1024px;
      height: 1100px;
      display: flex;
      flex-direction: column;
      background-color: blanchedalmond;
      border: 2px solid grey;
    }
    header {
      height: 60px;
      display: flex;
      background-color: white;
      border-bottom: 5px solid grey;
    }
    .side {
      width: 60px;
      background-color: brown;
      border-radius: 10px;
    }
    .menu {
      display: flex;
      flex-grow: 1;
      justify-content: center;
      align-items: center;
      gap: 60px;
      color: green;
    }
    main {
      flex-grow: 1;
      padding: 10px;
      gap: 10px;
      display: flex;
      flex-direction: column;
    }
    .a {
      display: flex;
      flex-grow: 1;
      justify-content: space-evenly;
      background-size: contain;
    }
    .b {
      display: flex;
      flex-grow: 1;
      justify-content: space-evenly;
      background-size: contain;
    }
    footer {
      height: 60px;
      background-color: #006241;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="side"></div>
      <div class="menu">
        <div class="menu1">정치</div>
        <div class="menu1">경제</div>
        <div class="menu1">사회</div>
        <div class="menu1">문화</div>
      </div>
      <div class="side"></div>
    </header>
    <main>
      <div class="a">
        <img src="./images/1.jpg" alt="1">
        <img src="./images/2.jpg" alt="2">
        <img src="./images/3.jpg" alt="3">
      </div>
      <div class="b">
        <img src="./images/4.jpg" alt="4">
        <img src="./images/5.jpg" alt="5">
        <img src="./images/6.jpg" alt="6">
      </div>
    </main>
    <footer>
      2025 my news site
    </footer>
  </div>
</body>
</html>
