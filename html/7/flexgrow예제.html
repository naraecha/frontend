<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      width: 500px;
      height: 230px;
      background-color: royalblue;
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
      gap: 10px;
      justify-content: space-around;
      align-items: center;
      flex-direction: column;
    }
    .a {
      width: 100%;
      gap: 20px;
      display: flex;
    }
    .b {
      display: flex;
      gap: 20px;
      width: 100%;
    }
    .item1 {
      flex-grow: 1;
      background-color: orange;
      border: 2px dashed orangered;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .item2 {
      flex-grow: 1;
      background-color: orange;
      border: 2px dashed orangered;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .item3 {
      flex-grow: 10;
      background-color: red;
      border: 2px dashed black;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .item4 {
      flex-grow: 1;
      background-color: orange;
      border: 2px dashed orangered;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .item5 {
      flex-grow: 1;
      background-color: orange;
      border: 2px dashed orangered;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .item6 {
      flex-grow: 10;
      background-color: orange;
      border: 2px dashed orangered;
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="a">
      <div class="item1">1</div>
      <div class="item2">2</div>
      <div class="item3">3</div>
    </div>
    <div class="b">
      <div class="item4">4</div>
      <div class="item5">5</div>
      <div class="item6">6</div>
    </div>
  </div>
</body>
</html>
