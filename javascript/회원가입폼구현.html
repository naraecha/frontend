<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      margin: 30px auto;
      background-color: rgb(234, 238, 238);
    }
    .container {
      width: 500px;
      height: 450px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 10px 20px hsla(0, 0%, 7%, .20);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 {
      margin-top: 0px;
    }
    input {
      width: 440px;
      height: 45px;
      border: 1px solid rgb(201, 201, 201);
      padding: 10px;
      box-sizing: border-box;
      border-radius: 5px;
    }
    .b {
      display: flex;
      flex-direction: column;
      gap: 25px
    }
    .input-box {
      position: relative;

    }
    .p1 {
      color: rgb(67, 184, 96);
      font-weight: 500;
    }
    .p2 {
      color: rgb(235, 122, 122);
      font-weight: 500;
    }
    p {
      position: absolute;
      top: 29px;
      right: 3px;
      font-size: 15.5px;
      display: none;
    }
    button {
      margin-top: 30px;
      width: 440px;
      height: 45px;
      border: 0;
      border-radius: 5px;
      color: white;
      background-color: rgb(38, 150, 224);
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      background-color: gray;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="a">
      <h1>회원 가입</h1>
    </div>
    <div class="b">
      <div class="input-box">
        <input type="text" class="in1" placeholder="id (영문자, 숫자, 밑줄만 포함 가능)">
        <p class="p1">사용 가능 합니다.</p>
        <p class="p2">입력 조건이 맞지 않습니다.</p>
      </div>
      <div class="input-box">  
        <input type="password" class="in2" placeholder="pw (영문 대소문자, 숫자, 특수문자 모두 포함 8자 이상)">
        <p class="p1">사용 가능 합니다.</p>
        <p class="p2">입력 조건이 맞지 않습니다.</p>
      </div>
      <div class="input-box">
        <input type="email" class="in3" placeholder="email">
        <p class="p1">사용 가능 합니다.</p>
        <p class="p2">입력 조건이 맞지 않습니다.</p>
      </div>
      <div class="input-box">
        <input type="tel" class="in4" placeholder="phone">
        <p class="p1">사용 가능 합니다.</p>
        <p class="p2">입력 조건이 맞지 않습니다.</p>
      </div>
    </div>
    <div class="c">
      <button>가입 요청</button>
    </div>
  </div>
  <script>
    const id = document.querySelector(".in1");
    const pw = document.querySelector(".in2");
    const email = document.querySelector(".in3");
    const phone = document.querySelector(".in4");

    const idRegEx = /^[a-zA-Z0-9_]+$/;
    id.addEventListener("input", () => {
      const box = id.parentElement;
      const success = box.querySelector(".p1");
      const error = box.querySelector(".p2");

      if (idRegEx.test(id.value)) {
        success.style.display = "block";
        error.style.display = "none";
      } else {
        success.style.display = "none";
        error.style.display = "block";
      }
    });

    const pwRegEx = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
    pw.addEventListener("input", () => {
      const box = pw.parentElement;
      const success = box.querySelector(".p1");
      const error = box.querySelector(".p2");

      if (pwRegEx.test(pw.value)) {
        success.style.display = "block";
        error.style.display = "none";
      } else {
        success.style.display = "none";
        error.style.display = "block";
      }
    });


    const emailRegEx = /^([a-z]+\d*)+(\.?\w+)+@\w+(\.\w{2,3})+$/;
    email.addEventListener("input", () => {
      const box = email.parentElement;
      const success = box.querySelector(".p1");
      const error = box.querySelector(".p2");

      if (emailRegEx.test(email.value)) {
        success.style.display = "block";
        error.style.display = "none";
      } else {
        success.style.display = "none";
        error.style.display = "block";
      }
    });

    const phoneRegEx = /^010-\d{4}-\d{4}$/;
    phone.addEventListener("input", () => {
      const box = phone.parentElement;
      const success = box.querySelector(".p1");
      const error = box.querySelector(".p2");

      if (phoneRegEx.test(phone.value)) {
        success.style.display = "block";
        error.style.display = "none";
      } else {
        success.style.display = "none";
        error.style.display = "block";
      }
    });

    const button = document.querySelector("button");
    button.disabled = true;

    function checkAllValid() {
      const idValid = idRegEx.test(id.value);
      const pwValid = pwRegEx.test(pw.value);
      const emailValid = emailRegEx.test(email.value);
      const phoneValid = phoneRegEx.test(phone.value);

      if (idValid && pwValid && emailValid && phoneValid) {
        button.disabled = false;
      } else {
        button.disabled = true;
      }
    }

    id.addEventListener("input", checkAllValid);
    pw.addEventListener("input", checkAllValid);
    email.addEventListener("input", checkAllValid);
    phone.addEventListener("input", checkAllValid);
  </script>
</body>
</html>
