<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
</head>
<body>
  <h1 id="title">문서 제목입니다.</h1>
  <p class="text">첫 번째 단락입니다.</p>
  <p class="text">두 번째 단락입니다.</p>
  <p>세 번째 단락입니다.</p>

  <div class="box-1">
    <p class="text">text-1</p>
    <p class="text">text-2</p>
  </div>
  <div class="box-2">
    <p class="text">text-3</p>
    <p class="text">text-4</p>
  </div>

  <script>
    // 문서의 최상위 노드
    const doc = document.firstChild;
    console.log(doc);

    // 실제 HTML 루트 엘리먼트
    const html = document.firstElementChild;
    console.log(html);

    // ID로 선택
    const el = document.getElementById("title");
    console.log(el);
    
    // 클래스 선택자
    const classEls = document.getElementsByClassName("text");
    console.log(classEls);

    // 태그명으로 선택
    const tagEls = document.getElementsByTagName("p");
    console.log(tagEls);

    // CSS 선택자
    const boxEl = document.querySelector(".box-1");
    console.log(boxEl);

  </script>
 </body>
</html>
